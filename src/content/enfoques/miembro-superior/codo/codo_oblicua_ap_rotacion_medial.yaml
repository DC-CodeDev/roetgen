titulo: Codo — Proyección AP Oblicua Rotación Medial
region: miembro-superior
subregion: codo
orden: 4
alias:
  - Oblicua medial de codo
  - AP oblicua codo rotación interna
  - Codo oblicua coronoides

dato_clinico: >
  Fracturas y luxaciones del codo, sobre todo de la apófisis coronoides, así
  como otros trastornos como osteoporosis y artritis, patologías del cúbito y
  epicondilitis medial (codo del golfista). La rotación medial de 45° despeja
  la apófisis coronoides de la superposición de la cabeza radial, permitiendo
  su visualización de perfil. Esta proyección es complementaria a la oblicua
  AP de rotación externa, que por el contrario libera la cabeza y el cuello
  radial.

receptor: >
  18x24 cm longitudinal o 24x30 cm transversal.

distancia: 100 cm

tecnica: >
  Técnica homogeneizada. Sin Bucky. Exposición directa sobre el receptor
  apoyado en la mesa.

posicion_paciente: >
  Paciente sentado en el extremo de la mesa con el brazo extendido y en
  contacto con la mesa.

posicion_region: >
  Se extiende el miembro en posición para una proyección AP y se centra el
  punto medio del receptor sobre la articulación del codo. Se rota en sentido
  medial o se prona la mano y se ajusta el codo para que su superficie anterior
  quede a un ángulo de 45° respecto al receptor. Este grado de oblicuidad
  suele separar la apófisis coronoides de la cabeza radial.

rayo_central: >
  Perpendicular a la articulación del codo.

anatomia_visible: >
  Proyección oblicua del codo con la apófisis coronoides proyectada libre de
  superposiciones. Estructuras visibles: apófisis coronoides de perfil, tróclea,
  epicóndilo humeral elongado medialmente, cúbito superpuesto a la cabeza
  y el cuello radial, olécranon dentro de la fosa olecraniana, partes blandas
  y trabeculación ósea.

criterios_calidad: >
  Apófisis coronoides de perfil y libre de superposición. Tróclea visible.
  Epicóndilo humeral elongado medialmente. Cúbito superpuesto a la cabeza
  y el cuello radial. Olécranon asentado dentro de la fosa olecraniana.
  Partes blandas y trabeculación ósea con densidad y contraste óptimos,
  sin movilidad.
